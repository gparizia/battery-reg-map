<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mappa Interattiva</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1e2d3d;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
  }

  .map-wrap {
    position: relative;
    width: 100%;
    max-width: 1400px;
    background: #1e2d3d;
  }

  svg {
    width: 100%;
    height: auto;
    display: block;
  }

  .country {
    fill: #3a5f7d;
    stroke: #1e2d3d;
    stroke-width: 0.5;
    transition: fill 0.2s;
  }

  .ocean {
    fill: #1e2d3d;
  }

  .pin-group {
    cursor: pointer;
  }

  .pin-group:hover .pin-outer {
    r: 14;
  }

  .pin-outer {
    fill: none;
    stroke: #00c9a7;
    stroke-width: 2.5;
    transition: all 0.2s;
  }

  .pin-inner {
    fill: #00c9a7;
    transition: all 0.2s;
  }

  .pin-group:hover .pin-inner {
    fill: #7ffde4;
  }

  .pin-group:hover .pin-outer {
    stroke: #7ffde4;
  }

  .pin-label {
    fill: #e8f4f8;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-weight: 700;
    font-size: 11px;
    pointer-events: none;
    paint-order: stroke;
    stroke: #1e2d3d;
    stroke-width: 3px;
    stroke-linejoin: round;
    letter-spacing: 0.3px;
  }

  .pin-leader {
    stroke: #00c9a7;
    stroke-width: 1;
    stroke-dasharray: 3,2;
    opacity: 0.6;
    pointer-events: none;
  }

  .pulse {
    fill: #00c9a7;
    opacity: 0;
    animation: pulse 2.5s infinite;
  }

  @keyframes pulse {
    0%   { r: 10; opacity: 0.5; }
    100% { r: 30; opacity: 0; }
  }

  .tooltip {
    position: fixed;
    background: rgba(10, 25, 40, 0.95);
    color: #e8f4f8;
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-family: 'Segoe UI', Arial, sans-serif;
    pointer-events: none;
    display: none;
    z-index: 999;
    border: 1px solid #00c9a7;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }

  .legend {
    position: absolute;
    bottom: 16px;
    left: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #8ab4cc;
    font-size: 11px;
    font-family: 'Segoe UI', Arial, sans-serif;
    opacity: 0.7;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #00c9a7;
    border: 2px solid #00c9a7;
    box-shadow: 0 0 6px #00c9a7;
  }
</style>
</head>

<body>

<div class="tooltip" id="tooltip"></div>

<div class="map-wrap">
  <svg id="map" viewBox="0 0 1400 700">
    <rect class="ocean" width="1400" height="700"/>
  </svg>
  <div class="legend">
    <div class="legend-dot"></div>
    Click a marker to open regulations
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>

<script>
// Two source files — common base path, different document IDs
const base1 = "https://ivecogroup.sharepoint.com/:x:/r/sites/REGIS/members/Shared%20Documents/Battery%20Documentation/Battery%20related%20regulations%20world.xlsx?d=w9bc8a79a434a4b2c90b198e25cf6b9f6&csf=1&web=1";
const base2 = "https://ivecogroup.sharepoint.com/:x:/r/sites/REGIS/members/Shared%20Documents/Battery%20Documentation/Battery%20related%20regulations%20world.xlsx?d=w9bc8a79a434a4b2c90b198e25cf6b9f6&csf=1&web=1";

const nav = (base, e, n) => `${base}&e=${e}&nav=${n}`;

const cities = [
  // ── File 1 (d=w1b31b...) ────────────────────────────────────────────────
  { name: "India",
    lon:  78,   lat:  22,
    url: nav(base1, "aogPDf", "MTVfe0MyNjQ1RjQwLTVFRTktRkY0Mi05NTA1LTNEQUUxNjYxM0M4MX0"),
    labelDx: 12, labelDy: -8 },
  { name: "Australia",
    lon: 134,   lat: -25,
    url: nav(base1, "xBFH3u", "MTVfezc5MDBDNzM4LThGMjgtQzU0Ny1CM0MyLTRBQkFFRTM5REZCRX0"),
    labelDx: 12, labelDy: -8 },
  { name: "Latin America",
    lon: -60,   lat: -15,
    url: nav(base1, "6urbLu", "MTVfezEyRkE3QkJFLTk3MjktNTQ0MS1BMUI5LUM0MzQyMUI2RTdGRH0"),
    labelDx: 12, labelDy: -8 },
  { name: "Taiwan",
    lon: 121,   lat:  23.7,
    url: nav(base1, "7ucrZt", "MTVfezk4MjY1NDM4LUVGQjMtMzk0Ny04MTkzLTMyQUQxRDNFRjI5RH0"),
    labelDx: 14, labelDy: -14 },
  { name: "European Countries",
    lon:  14,   lat:  48,
    url: nav(base1, "tbDsed", "MTVfe0VGMjZEQjZCLTdGMTktMTk0Ri1BNDAxLTJFNTA4NUQ4Q0E1M30"),
    labelDx: -130, labelDy: 22, leaderX: -6, leaderY: 4 },

  // ── File 2 (d=w61b86...) ────────────────────────────────────────────────
  { name: "UNECE",
    lon:   8,   lat:  46.5,
    url: nav(base2, "xwQkpY", "MTVfe0E2RTM0OUVDLTIyQ0YtRkU0Ri1CODkxLTBGN0U3MTMyQTdFNX0"),
    labelDx: -62, labelDy: -16, leaderX: -4, leaderY: -4 },
  { name: "UE (Single Market)",
    lon:   3,   lat:  56,
    url: nav(base2, "3PJJYx", "MTVfezAwMDE5RkMzLTNCOUMtNEM0Mi1CMjJFLUI5RTdGMTBDQUNENX0"),
    labelDx: 14, labelDy: -14 },
  { name: "United States",
    lon: -98,   lat:  39,
    url: nav(base2, "0fmyDa", "MTVfezI3QThCMjY4LUNENTQtMEI0NS1CQjhGLUQ4NzJCQTNEOEEzRX0"),
    labelDx: 12, labelDy: -8 },
  { name: "Canada",
    lon: -96,   lat:  60,
    url: nav(base2, "D8WP4h", "MTVfezNDNDg2QzM1LUYxMzEtMDU0My1BODcwLTAyODcwQzU4QkJEQX0"),
    labelDx: 12, labelDy: -8 },
  { name: "New Zealand",
    lon: 172,   lat: -42,
    url: nav(base2, "6gywjA", "MTVfezNBQjAwNDVGLTREMTEtOUU0My04QkNFLUUyNEM0RDk1MEEwQn0"),
    labelDx: -100, labelDy: -14, leaderX: -4, leaderY: -4 },
  { name: "China",
    lon: 104,   lat:  35,
    url: nav(base2, "YuHSRH", "MTVfe0VGOTQxNkZELTBBOTgtNzc0Ri04NjM0LTAyMjZBMUFENzdFQ30"),
    labelDx: 12, labelDy: -8 },
  { name: "South Korea",
    lon: 128,   lat:  37,
    url: nav(base2, "6hwRM7", "MTVfezYxMDE0REYxLUY0MEItQUI0OS05OTgyLTEyRkNFNzAzRjYyRn0"),
    labelDx: 14, labelDy: 18 },
  { name: "Singapore",
    lon: 103.8, lat:   1.3,
    url: nav(base2, "JiaHxt", "MTVfe0MxQkM2ODI5LTc0NDUtNEY0Ri1BNUVELTgyQURCNjNEMjgyQX0"),
    labelDx: -80, labelDy: -14, leaderX: -4, leaderY: -4 },
  { name: "Hong Kong",
    lon: 114.2, lat:  22.3,
    url: nav(base2, "spx9Hh", "MTVfezg0OEI3NzNFLTkxQTktNTE0My04NzAwLTlBM0FFMTBBRkNEQX0"),
    labelDx: -85, labelDy: 18, leaderX: -4, leaderY: 4 },
  { name: "Saudi Arabia",
    lon:  44,   lat:  24,
    url: nav(base2, "sQlvhV", "MTVfezMwN0Y2Mjg0LUU0M0YtNjM0Qi1CM0IwLTMxNDNFNTMwRUYxOX0"),
    labelDx: -90, labelDy: -14, leaderX: -4, leaderY: -4 },
  { name: "Gulf States Org.",
    lon:  54,   lat:  23.5,
    url: nav(base2, "ZKHhsw", "MTVfezA4MEEzQ0UyLUU4MEQtMUM0My05MTNELUQ0NjYwNzJGMkQ2MH0"),
    labelDx: 14, labelDy: 18 },
  { name: "Japan",
    lon: 138,   lat:  37,
    url: nav(base2, "OiNKKR", "MTVfezdEMDQ5NUUyLUU1QTgtNzM0Ni05RjczLTQ5NjJEMTlGNkJEMn0"),
    labelDx: 14, labelDy: -8 },
  { name: "Thailand",
    lon: 101,   lat:  15,
    url: nav(base2, "OiNKKR", "MTVfezdEMDQ5NUUyLUU1QTgtNzM0Ni05RjczLTQ5NjJEMTlGNkJEMn0"),
    labelDx: -72, labelDy: -14, leaderX: -4, leaderY: -4 },
  { name: "Indonesia",
    lon: 117,   lat:  -3,
    url: nav(base2, "izvKdC", "MTVfezZCMDVDQjEzLTMyN0ItMEI0Qy1CNTkwLUVBMzkyRjdCNkE4M30"),
    labelDx: 14, labelDy: 18 },
  { name: "Malaysia",
    lon: 109,   lat:   4,
    url: nav(base2, "pQJMOw", "MTVfezYxMkYzRUE0LUE2MUYtMjQ0RC04RDlBLUIyNEI0ODkxRTdEOH0"),
    labelDx: 14, labelDy: -8 },
  { name: "Azerbaijan",
    lon:  49,   lat:  40.5,
    url: nav(base2, "aPGUTq", "MTVfezhCODUxRjdELUYwMzItRjg0NC05NTZDLTUzM0RCREJEOTg5NH0"),
    labelDx: 14, labelDy: -8 },
];

const width = 1400, height = 700;
const svg = d3.select("#map");

const projection = d3.geoEquirectangular()
  .scale(height / Math.PI)
  .translate([width / 2, height / 2]);

const path = d3.geoPath().projection(projection);

fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
  .then(r => r.json())
  .then(world => {

    const countries = topojson.feature(world, world.objects.countries);

    svg.append("g")
      .selectAll("path")
      .data(countries.features)
      .join("path")
      .attr("class", "country")
      .attr("d", path);

    cities.forEach(city => {
      const [x, y] = projection([city.lon, city.lat]);

      const g = svg.append("g")
        .attr("class", "pin-group")
        .attr("transform", `translate(${x},${y})`)
        .on("click", () => window.open(city.url, "_blank"))
        .on("mouseenter", (e) => {
          const tip = document.getElementById("tooltip");
          tip.textContent = city.name + " — click to open";
          tip.style.display = "block";
          tip.style.left = (e.clientX + 14) + "px";
          tip.style.top = (e.clientY - 36) + "px";
        })
        .on("mousemove", (e) => {
          const tip = document.getElementById("tooltip");
          tip.style.left = (e.clientX + 14) + "px";
          tip.style.top = (e.clientY - 36) + "px";
        })
        .on("mouseleave", () => {
          document.getElementById("tooltip").style.display = "none";
        });

      g.append("circle")
        .attr("class", "pulse")
        .attr("r", 10)
        .style("animation-delay", (Math.random() * 2.5) + "s");

      g.append("circle")
        .attr("class", "pin-outer")
        .attr("r", 10);

      g.append("circle")
        .attr("class", "pin-inner")
        .attr("r", 4);

      // Leader line for labels offset far from the pin
      if (city.leaderX !== undefined) {
        g.append("line")
          .attr("class", "pin-leader")
          .attr("x1", city.leaderX)
          .attr("y1", city.leaderY)
          .attr("x2", city.labelDx)
          .attr("y2", city.labelDy);
      }

      g.append("text")
        .attr("class", "pin-label")
        .attr("x", city.labelDx)
        .attr("y", city.labelDy)
        .text(city.name);
    });

  })
  .catch(err => {
    console.error("Map load error:", err);
    svg.append("text")
      .attr("x", 700).attr("y", 350)
      .attr("text-anchor", "middle")
      .attr("fill", "#8ab4cc")
      .text("Error loading map");
  });
</script>

</body>
</html>
